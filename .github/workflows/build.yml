name: Cross-Platform Build Factory

on:
  push:
    branches: [ main ]

jobs:
  # Job 1: Build the fast Rust Engine for Android
  build-rust-engine:
    name: Build Android Rust Core
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android

    - name: Install Android NDK Linker
      run: cargo install cargo-ndk

    - name: Compile High-Speed Engine
      run: cargo ndk -t arm64-v8a build --release

    - name: Share Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rust-android-binary
        path: target/aarch64-linux-android/release/ultra_share

  # Job 2: Package the Android Application
  android-apk:
    name: Build Visual APK
    needs: build-rust-engine
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Up Java Environment
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set Up Flutter Framework
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Dynamically Build and Configure Frontend Template
      run: |
        # Generate the frontend project layer entirely in the cloud environment
        flutter create mobile_frontend --platforms=android
        cd mobile_frontend
        
        # Create the asset subfolders safely
        mkdir -p assets/bin/
        
        # Inject the scanner plugin configuration
        echo "  mobile_scanner: ^5.0.0" >> pubspec.yaml

    - name: Download Rust Binary Core into Asset Layer
      uses: actions/download-artifact@v4
      with:
        name: rust-android-binary
        path: mobile_frontend/assets/bin/

    - name: Finalize Configuration and Build Package
      run: |
        cd mobile_frontend
        # Explicitly append the assets registration block to pubspec.yaml
        echo -e "\nflutter:\n  assets:\n    - assets/bin/ultra_share" >> pubspec.yaml
        
        flutter pub get
        flutter build apk --release

    - name: Upload Finished Android Installer
      uses: actions/upload-artifact@v4
      with:
        name: ultra-share-app
        path: mobile_frontend/build/app/outputs/flutter-apk/app-release.apk

