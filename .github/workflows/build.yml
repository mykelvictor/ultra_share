name: Cross-Platform Build Factory

on:
  push:
    branches: [ main ]

jobs:
  # Job 1: Build the High-Speed Rust Engine for Android
  build-rust-android:
    name: Build Android Rust Core
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Up Rust Target Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android

    - name: Install Android Cross-Compiler Tool
      run: cargo install cargo-ndk

    - name: Compile Optimized Mobile Engine
      run: cargo ndk -t arm64-v8a build --release

    - name: Share Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rust-android-binary
        path: target/aarch64-linux-android/release/ultra_share

  # Job 2: Build the Clean Android App Installer Bundle
  android-apk:
    name: Package Android APK
    needs: build-rust-android
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Up Java Environment
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set Up Flutter Framework
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Build Pristine Project Framework From Scratch
      run: |
        # Create an isolated platform configuration environment
        flutter create clean_mobile --platforms=android
        cd clean_mobile
        
        # Inject our explicit binary assets path declaration safely
        echo -e "\nflutter:\n  assets:\n    - assets/bin/ultra_share" >> pubspec.yaml
        mkdir -p assets/bin/

    - name: Pull Compiled Rust Engine Into Mobile Assets Folder
      uses: actions/download-artifact@v4
      with:
        name: rust-android-binary
        path: clean_mobile/assets/bin/

    - name: Supply Interface Architecture File
      run: |
        # Safely copy our source track directly into the isolated workspace build target
        cp mobile_frontend/lib/main.dart clean_mobile/lib/main.dart

    - name: Build Production Release Package
      run: |
        cd clean_mobile
        flutter pub get
        flutter build apk --release

    - name: Upload Finished Android Installer
      uses: actions/upload-artifact@v4
      with:
        name: ultra-share-android-apk
        path: clean_mobile/build/app/outputs/flutter-apk/app-release.apk

