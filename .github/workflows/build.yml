name: Cross-Platform Build Factory

on:
  push:
    branches: [ main ]

jobs:
  # Job 1: Build the fast Rust Engine for Android
  build-rust-android:
    name: Build Android Rust Core
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Up Rust Target Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android

    - name: Install Android Cross-Compiler Tool
      run: cargo install cargo-ndk

    - name: Compile Optimized Mobile Engine
      run: cargo ndk -t arm64-v8a build --release

    - name: Share Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rust-android-binary
        path: target/aarch64-linux-android/release/ultra_share

  # Job 2: Build the clean Android App Installer Bundle
  android-apk:
    name: Package Android APK
    needs: build-rust-android
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Up Java Environment
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set Up Flutter Framework
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Pull Compiled Rust Engine Into Mobile Assets Folder
      uses: actions/download-artifact@v4
      with:
        name: rust-android-binary
        path: mobile_frontend/assets/bin/

    - name: Generate Core Platform Bindings
      run: |
        cd mobile_frontend
        # This configures missing platform configurations safely inside the runner
        flutter create . --platforms=android

    - name: Build Production Release Package
      run: |
        cd mobile_frontend
        flutter pub get
        flutter build apk --release

    - name: Upload Finished Android Installer
      uses: actions/upload-artifact@v4
      with:
        name: ultra-share-android-apk
        path: mobile_frontend/build/app/outputs/flutter-apk/app-release.apk

