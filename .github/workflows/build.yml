name: Cross-Platform Build Factory

on:
  push:
    branches: [ main ]

jobs:
  # Job 1: Desktop Compilation Matrix (Unchanged and Green)
  desktop-release:
    name: Build Installer for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Up Rust Toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Compile Optimized Binary
      run: cargo build --release

    - name: Upload Finished Executable Asset
      uses: actions/upload-artifact@v4
      with:
        name: ultra-share-${{ matrix.os }}
        path: |
          target/release/ultra_share
          target/release/ultra_share.exe

  # Job 2: Complete Android Packaging Layer
  android-release:
    name: Build Android APK (Flutter + Rust)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Up Java Environment
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set Up Rust & Android Targets
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

    - name: Set Up Flutter Framework
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install Bridge Tools & Generate App Template
      run: |
        cargo install flutter_rust_bridge_codegen --version 1.82.6
        flutter create mobile_frontend --platforms=android
        
    - name: Inject Bridge Dependencies into Mobile Template
      run: |
        cd mobile_frontend
        echo "  flutter_rust_bridge: ^1.82.6" >> pubspec.yaml
        echo "  mobile_scanner: ^5.0.0" >> pubspec.yaml

    - name: Run Cloud Bridge Code Generation
      run: |
        flutter_rust_bridge_codegen \
          --rust-input src/api.rs \
          --dart-output mobile_frontend/lib/bridge_generated.dart \
          --dart-decl-output mobile_frontend/lib/bridge_definitions.dart

    - name: Build Production Android APK
      run: |
        cd mobile_frontend
        flutter pub get
        flutter build apk --release

    - name: Upload Finished Android Installer
      uses: actions/upload-artifact@v4
      with:
        name: ultra-share-android-apk
        path: mobile_frontend/build/app/outputs/flutter-apk/app-release.apk

