name: Cross-Platform Build Factory

on:
  push:
    branches: [ main ]

jobs:
  # Job 1: Stable Desktop Matrix
  desktop-release:
    name: Build Installer for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Up Rust Toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Compile Optimized Binary
      run: cargo build --release

    - name: Upload Finished Executable Asset
      uses: actions/upload-artifact@v4
      with:
        name: ultra-share-${{ matrix.os }}
        path: |
          target/release/ultra_share
          target/release/ultra_share.exe

  # Job 2: Android Native Compilation Layer
  android-release:
    name: Build Android APK (Flutter + Rust)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Up Java Environment
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set Up Flutter Framework
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install Android Cargo Cross-Compiler Tools
      run: |
        rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
        cargo install cargo-ndk

    - name: Generate Frontend Architecture Template
      run: |
        flutter create mobile_frontend --platforms=android
        cd mobile_frontend
        echo "  flutter_rust_bridge: ^1.82.6" >> pubspec.yaml
        echo "  mobile_scanner: ^5.0.0" >> pubspec.yaml
        flutter pub get

    - name: Install Code Generator and Synchronize Bridge
      run: |
        cargo install flutter_rust_bridge_codegen --version 1.82.6
        flutter_rust_bridge_codegen \
          --rust-input src/api.rs \
          --dart-output mobile_frontend/lib/bridge_generated.dart \
          --dart-decl-output mobile_frontend/lib/bridge_definitions.dart

    - name: Compile Native C-Bindings and Build Production APK
      run: |
        cd mobile_frontend
        flutter build apk --release

    - name: Upload Finished Android Installer
      uses: actions/upload-artifact@v4
      with:
        name: ultra-share-android-apk
        path: mobile_frontend/build/app/outputs/flutter-apk/app-release.apk

