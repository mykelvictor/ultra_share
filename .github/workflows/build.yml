name: Cross-Platform Build Factory

on:
  push:
    branches: [ main ]

jobs:
  # Job 1: Desktop Matrix (Keeps building your rock-solid green binaries)
  desktop-release:
    name: Build Installer for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Up Rust Toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Compile Optimized Binary
      run: cargo build --release

    - name: Upload Finished Executable Asset
      uses: actions/upload-artifact@v4
      with:
        name: ultra-share-${{ matrix.os }}
        path: |
          target/release/ultra_share
          target/release/ultra_share.exe

  # Job 2: Complete Modern Flutter + Rust Integration Engine
  android-release:
    name: Build Android APK (Flutter + Rust)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Up Java Environment
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set Up Rust & Android Targets
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

    - name: Set Up Flutter Framework
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install Modern Bridge Codegen Tools
      run: cargo install flutter_rust_bridge_codegen

    - name: Generate and Auto-Integrate Project Architecture
      run: |
        # 1. Create a clean root flutter wrapper layer
        flutter create mobile_frontend --platforms=android
        
        # 2. Let the codegen tool link the directories and auto-configure build.gradle
        cd mobile_frontend
        flutter_rust_bridge_codegen integrate
        
        # 3. Add the camera module scanning dependencies to the new stack
        echo "  mobile_scanner: ^5.0.0" >> pubspec.yaml
        flutter pub get

    - name: Generate Code Bindings and Build Release Package
      run: |
        cd mobile_frontend
        flutter_rust_bridge_codegen generate
        flutter build apk --release

    - name: Upload Finished Android Installer
      uses: actions/upload-artifact@v4
      with:
        name: ultra-share-android-apk
        path: mobile_frontend/build/app/outputs/flutter-apk/app-release.apk

